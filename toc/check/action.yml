name: WoW Build Tools - TOC Check
description: Check for common issues in your World of Warcraft addon TOC files.
branding:
  icon: zap
  color: blue

inputs:
  args:
    description: Arguments to pass to `wow-build-tools toc check`.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Handle inputs
      id: handle-inputs
      shell: bash
      run: |
        set -euo pipefail

        # TODO: Add options to the action itself rather than just args
        if [ -z "${{ inputs.args }}" ]; then
          INPUT_ARGS=""
        else
          INPUT_ARGS="${{ inputs.args }}"
        fi

        echo "INPUT_ARGS=${INPUT_ARGS}" >> $GITHUB_OUTPUT
    - name: Run wow-build-tools
      shell: bash
      run: |
        set -euo pipefail

        ${GITHUB_ACTION_PATH}/dist/wow-build-tools toc check ${{ steps.handle-inputs.outputs.INPUT_ARGS }}
