# Reusable workflow: PR checks (tests, translations, packaging, linting)
#
# Triggered on pull_request and merge_group events. Runs Lua tests, optional
# i18n translation checks, test packaging with PR comment, optional trunk
# linting, and commitlint.
#
# Inputs:
#   addon-name:          Addon directory name (e.g., Endeavoring, RPGLootFeed)
#   rockspec-name:       Rockspec filename (e.g., endeavoring-1-1.rockspec)
#   lua-version:         Lua version for tests (default 5.4.4)
#   i18n-enabled:        Whether to run i18n translation checks
#   trunk-enabled:       Whether to run trunk code quality checks
#   locale-dir:          Locale directory path (default: {addon-name}/locale)
#   locale-xml:          XML file listing locale scripts (default: index.xml)
#   locale-table:        Locale table name used in addon code (default: L)
#   i18n-ignore-dirs:    Extra directories to ignore in hardcode string check
#   i18n-ignore-files:   Extra files to ignore in hardcode string check
#
# Expects in the calling repo:
#   - Makefile with test-ci target
#   - commitlint.config.js

name: PR Checks

on:
  workflow_call:
    inputs:
      addon-name:
        description: Addon directory name (e.g., Endeavoring, RPGLootFeed)
        required: true
        type: string
      rockspec-name:
        description: Rockspec filename (e.g., endeavoring-1-1.rockspec)
        required: true
        type: string
      lua-version:
        description: Lua version for tests (default 5.4.4)
        required: false
        type: string
        default: 5.4.4
      i18n-enabled:
        description: Whether to run i18n translation checks
        required: false
        type: boolean
        default: false
      trunk-enabled:
        description: Whether to run trunk code quality checks
        required: false
        type: boolean
        default: false
      locale-dir:
        description: "Locale directory path (default: {addon-name}/locale)"
        required: false
        type: string
        default: ""
      locale-xml:
        description: "XML file listing locale scripts within locale-dir (default: index.xml)"
        required: false
        type: string
        default: index.xml
      locale-table:
        description: "Locale table name used in addon code (default: L). Matches ns.L, G_RLF.L, etc. automatically."
        required: false
        type: string
        default: L
      i18n-ignore-dirs:
        description: "Space-separated list of directory names to ignore in hardcode string check (appended to defaults: icons locale)"
        required: false
        type: string
        default: ""
      i18n-ignore-files:
        description: Space-separated list of filenames to ignore in hardcode string check
        required: false
        type: string
        default: ""
      wbt-ref:
        description: wow-build-tools ref to use for configs/scripts (default v1)
        required: false
        type: string
        default: v1

permissions: {}

jobs:
  check_translations:
    if: ${{ inputs.i18n-enabled }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout wow-build-tools (i18n scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: McTalian-WoW-Addons/wow-build-tools
          ref: ${{ inputs.wbt-ref }}
          path: .wbt

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync uv (WBT i18n dependencies)
        run: uv sync --project .wbt/scripts/i18n

      - name: Deprecation warning for local i18n scripts
        run: |
          if [ -f ".scripts/missing_translation_check.py" ]; then
            echo "::warning::'.scripts/missing_translation_check.py' found — i18n scripts are now centralized in wow-build-tools. Remove the i18n scripts from '.scripts/' after upgrading."
          fi

      - name: Run translation check script
        run: |
          LOCALE_DIR="${{ inputs.locale-dir || format('{0}/locale', inputs.addon-name) }}"
          uv run --project .wbt/scripts/i18n \
            .wbt/scripts/i18n/missing_translation_check.py \
            --locale-dir "$LOCALE_DIR" \
            --locale-xml "${{ inputs.locale-xml }}"
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Check for hard-coded strings
        run: |
          EXTRA_DIRS="${{ inputs.i18n-ignore-dirs }}"
          EXTRA_FILES="${{ inputs.i18n-ignore-files }}"
          DIR_ARGS=""
          FILE_ARGS=""
          if [ -n "$EXTRA_DIRS" ]; then
            DIR_ARGS="--ignore-dirs icons locale $EXTRA_DIRS"
          fi
          if [ -n "$EXTRA_FILES" ]; then
            FILE_ARGS="--ignore-files $EXTRA_FILES"
          fi
          uv run --project .wbt/scripts/i18n \
            .wbt/scripts/i18n/hardcode_string_check.py \
            --addon-dir "${{ inputs.addon-name }}" \
            $DIR_ARGS $FILE_ARGS

      - name: Run missing locale keys check
        run: |
          LOCALE_DIR="${{ inputs.locale-dir || format('{0}/locale', inputs.addon-name) }}"
          uv run --project .wbt/scripts/i18n \
            .wbt/scripts/i18n/check_for_missing_locale_keys.py \
            --addon-dir "${{ inputs.addon-name }}" \
            --locale-dir "$LOCALE_DIR" \
            --locale-table "${{ inputs.locale-table }}"

  run_tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: McTalian-WoW-Addons/gh-actions-lua@ff6eeef8bc502bfe3dbdd3d87dc0a4766f8c9fb0 # v1.0.2
        with:
          luaVersion: ${{ inputs.lua-version }}

      - uses: leafo/gh-actions-luarocks@35d062def313a7699a0d513e996bcf4352f05389 # v6.1.0
        with:
          luaRocksVersion: 3.11.1

      - name: Install luarock dependencies
        run: luarocks make --local ${{ inputs.rockspec-name }}

      - name: Run Tests
        run: make test-ci

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: luacov-html
          path: luacov-html/

  test_package:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      actions: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Fetch Latest Release Assets
        id: fetch-release-assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if any releases exist
          if gh release list --limit 1 | grep -q .; then
            # Try to get nolib size, default to 0 if not found
            nolib_size=$(gh release view --json assets -q '.assets[] | select(.name | endswith("nolib.zip")) | .size' || echo "0")
            nolib_size=${nolib_size:-0}

            # Try to get standard size, default to 0 if not found
            lib_size=$(gh release view --json assets -q '.assets[] | select(.name | endswith(".zip")) | select(.name | contains("-nolib") | not) | .size' || echo "0")
            lib_size=${lib_size:-0}

            echo "NoLibSize: $nolib_size"
            echo "LibSize: $lib_size"
            echo "LATEST_RELEASE_NOLIB_SIZE=$nolib_size" >> $GITHUB_OUTPUT
            echo "LATEST_RELEASE_LIBS_SIZE=$lib_size" >> $GITHUB_OUTPUT
          else
            echo "No releases found, setting sizes to 0"
            echo "LATEST_RELEASE_NOLIB_SIZE=0" >> $GITHUB_OUTPUT
            echo "LATEST_RELEASE_LIBS_SIZE=0" >> $GITHUB_OUTPUT
          fi

      - name: Package
        # trunk-ignore(pinact/unpinned-action)
        uses: McTalian-WoW-Addons/wow-build-tools@v1
        with:
          args: -d -t ./${{ inputs.addon-name }} -r ./.release --skipChangelog -n {package-name}-pr${{github.event.number}}-{nolib}{classic}

      - name: Capture Filenames
        id: capture-filenames
        run: |
          # Check for nolib build
          if ls .release/*-nolib.zip 1> /dev/null 2>&1; then
            FILE1=$(ls .release/*-nolib.zip | head -n1)
            echo "NOLIBZIP=$FILE1" >> $GITHUB_OUTPUT
            echo "TEST_NOLIB_SIZE=$(stat -c%s "$FILE1")" >> $GITHUB_OUTPUT
            echo "HAS_NOLIB=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_NOLIB=false" >> $GITHUB_OUTPUT
            echo "TEST_NOLIB_SIZE=0" >> $GITHUB_OUTPUT
          fi

          # Check for standard build (with or without libs)
          if ls .release/*.zip 2>/dev/null | grep -v 'nolib' 1> /dev/null 2>&1; then
            FILE2=$(ls .release/*.zip | grep -v 'nolib' | head -n1)
            echo "ZIP=$FILE2" >> $GITHUB_OUTPUT
            echo "TEST_LIBS_SIZE=$(stat -c%s "$FILE2")" >> $GITHUB_OUTPUT
            echo "HAS_STANDARD=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_STANDARD=false" >> $GITHUB_OUTPUT
            echo "TEST_LIBS_SIZE=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload Standard Package
        if: steps.capture-filenames.outputs.HAS_STANDARD == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload-zips-standard
        with:
          name: pr-pkg
          path: ${{ steps.capture-filenames.outputs.ZIP }}

      - name: Upload NoLib Package
        if: steps.capture-filenames.outputs.HAS_NOLIB == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload-zips-nolib
        with:
          name: pr-pkg-nolib
          path: ${{ steps.capture-filenames.outputs.NOLIBZIP }}

      - name: Checkout wow-build-tools scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: McTalian-WoW-Addons/wow-build-tools
          ref: ${{ inputs.wbt-ref }}
          sparse-checkout: .github/scripts
          path: .wbt

      - name: Post PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const script = require('./.wbt/.github/scripts/post-pkg-comment.cjs');
            await script({
              github,
              context,
              hasStandard: ${{ steps.capture-filenames.outputs.HAS_STANDARD == 'true' }},
              hasNoLib: ${{ steps.capture-filenames.outputs.HAS_NOLIB == 'true' }},
              libsUrl: "${{ steps.upload-zips-standard.outputs.artifact-url || '' }}",
              noLibUrl: "${{ steps.upload-zips-nolib.outputs.artifact-url || '' }}",
              latestReleaseStandardSize: ${{ steps.fetch-release-assets.outputs.LATEST_RELEASE_LIBS_SIZE }},
              testPkgStandardSize: ${{ steps.capture-filenames.outputs.TEST_LIBS_SIZE }},
              latestReleaseNoLibSize: ${{ steps.fetch-release-assets.outputs.LATEST_RELEASE_NOLIB_SIZE }},
              testPkgNoLibSize: ${{ steps.capture-filenames.outputs.TEST_NOLIB_SIZE }},
            });

  trunk-check:
    if: ${{ inputs.trunk-enabled }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trunk Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: trunk-cache-${{ hashFiles('**/trunk.yaml') }}
          path: ~/.cache/trunk

      - name: Trunk Code Quality
        uses: trunk-io/trunk-action@04ba50e7658c81db7356da96657e6e77f220bfa3 # v1.3.1

  commitlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TITLE: ${{ github.event.pull_request.title }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Checkout wow-build-tools (commitlint config)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: McTalian-WoW-Addons/wow-build-tools
          ref: ${{ inputs.wbt-ref }}
          path: .wbt

      - name: Install Node.js
        uses: volta-cli/action@615a78f6c83e116339c53b94f3f82b4d6c0b7d18 # v5.0.0
        with:
          package-json-path: .wbt/package.json

      - name: Install dependencies
        run: npm ci --prefix .wbt

      - name: Run commitlint (PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: echo "${TITLE}" | npx --prefix .wbt commitlint --config .wbt/commitlint.config.js

      - name: Run commitlint (Merge Group)
        if: ${{ github.event_name == 'merge_group' }}
        run: npx --prefix .wbt commitlint --last --config .wbt/commitlint.config.js

  all_pr_checks:
    name: Passing PR Checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      [check_translations, run_tests, test_package, trunk-check, commitlint]
    steps:
      - name: Export needs results as JSON
        id: export-needs
        run: echo '${{ toJSON(needs) }}' > needs.json

      - name: Check if all jobs passed or were skipped
        run: |
          needs=$(cat needs.json)
          for job in $(echo "$needs" | jq -r 'keys[]'); do
            result=$(echo "$needs" | jq -r ".\"$job\".result")
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Job $job failed."
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."
        shell: bash
