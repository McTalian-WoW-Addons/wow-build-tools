name: PR Checks
on:
  pull_request:

permissions: {}

jobs:
  check-dist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build binary
        run: |
          go build -o dist/wow-build-tools

      - name: Verify 'dist' is up to date
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Error: 'dist' directory is not up to date. Please run 'go build -o dist/wow-build-tools' and commit the changes."
            git status --porcelain
            exit 1
          else
            echo "'dist' directory is up to date."
          fi

      - name: Smoke test built binary
        run: |
          dist/wow-build-tools build --help

  trunk-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trunk Code Quality
        uses: trunk-io/trunk-action@v1

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum

      - name: Go cache paths
        id: go-cache-paths
        run: |
          GOPATHBIN=$(go env GOPATH)/bin
          [ -d $GOPATHBIN ] && chmod -R 0755 $GOPATHBIN
          echo "go-tool=$GOPATHBIN" >> $GITHUB_OUTPUT

      - name: Install Go dependencies
        run: go mod download

      - name: Go Tool Cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-tool }}
          key: ${{ runner.os }}-go-tools-${{ hashFiles('**/go.tools') }}

      - name: Install tools
        run: |
          for tool in $(cat go.tools); do
            go install "$tool"
          done

      - name: Run tests
        run: |
          mkdir -p ./.coverage
          echo "Running tests with coverage"
          go test -v ./... -coverpkg=./... -coverprofile="./.coverage/cover.out" -json > .coverage/test-report.json || true
          echo "Generating reports"
          gopogh -in .coverage/test-report.json -out_summary .coverage/test-summary.json -out_html .coverage/test-report.html 1> /dev/null
          go tool cover -html=./.coverage/cover.out -o .coverage/cover.html
          covreport -i .coverage/cover.out -o .coverage/report.html
          NumberPassed=$(cat ./.coverage/test-summary.json | jq '.NumberOfPass')
          NumFailed=$(cat ./.coverage/test-summary.json | jq '.NumberOfFail')
          TotalTests=$(cat ./.coverage/test-summary.json | jq '.NumberOfTests')
          TotalTime=$(cat ./.coverage/test-summary.json | jq '.TotalDuration')

          echo ""
          echo "Tests passed: $NumberPassed / $TotalTests in $TotalTime seconds."
          if [ "$NumFailed" -ne "0" ]; then
            echo "Tests failed: $NumFailed"
            exit 1
          fi

      - name: Upload test and coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./.coverage
          include-hidden-files: true

  all_pr_checks:
    name: Passing PR Checks
    runs-on: ubuntu-latest
    if: always()
    needs: [check-dist, trunk-check, test]
    steps:
      - name: Export needs results as JSON
        id: export-needs
        run: echo '${{ toJSON(needs) }}' > needs.json

      - name: Check if all jobs passed or were skipped
        run: |
          needs=$(cat needs.json)
          for job in $(echo "$needs" | jq -r 'keys[]'); do
            result=$(echo "$needs" | jq -r ".\"$job\".result")
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Job $job failed."
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."
        shell: bash
