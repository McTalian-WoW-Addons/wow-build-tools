name: Auto-build dist
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**/*.go"
      - "!**/*_test.go"
      - go.mod
      - go.sum

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-build:
    runs-on: ubuntu-latest
    # Only run on PRs from the same repository (not forks)
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: React to indicate start
        uses: actions/github-script@v7
        with:
          script: |
            // Get all reactions on the PR
            const reactions = await github.rest.reactions.listForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            // Remove any existing rocket reactions from github-actions bot
            for (const reaction of reactions.data) {
              if (reaction.content === 'rocket' && reaction.user.login === 'github-actions[bot]') {
                await github.rest.reactions.deleteForIssue({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  reaction_id: reaction.id
                });
              }
            }

            // Add eyes reaction to indicate we're working on it
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              content: 'eyes'
            });

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install dependencies
        run: go mod download

      - name: Build dist
        run: make build

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: auto-build dist [skip ci]"
          git push

      - name: Update reactions on completion
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // Get all reactions on the PR
            const reactions = await github.rest.reactions.listForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            // Remove all eyes reactions from github-actions bot
            for (const reaction of reactions.data) {
              if (reaction.content === 'eyes' && reaction.user.login === 'github-actions[bot]') {
                await github.rest.reactions.deleteForIssue({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  reaction_id: reaction.id
                });
              }
            }

            // Add rocket to indicate completion
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              content: 'rocket'
            });
