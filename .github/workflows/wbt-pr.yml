name: PR Checks
on:
  pull_request:
  merge_group:

permissions: {}

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  trunk-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trunk Code Quality
        uses: trunk-io/trunk-action@v1

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum

      - name: Go cache paths
        id: go-cache-paths
        run: |
          GOPATHBIN=$(go env GOPATH)/bin
          [ -d $GOPATHBIN ] && chmod -R 0755 $GOPATHBIN
          echo "go-tool=$GOPATHBIN" >> $GITHUB_OUTPUT

      - name: Install Go dependencies
        run: go mod download

      - name: Go Tool Cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-tool }}
          key: ${{ runner.os }}-go-tools-${{ hashFiles('**/go.tools') }}

      - name: Install tools
        run: |
          for tool in $(cat go.tools); do
            go install "$tool"
          done

      - name: Run tests
        run: CC_THRESHOLD=10 ./scripts/test.sh

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: ./.coverage
          include-hidden-files: true

      - name: Get Riskover Metrics Output
        if: github.event_name == 'pull_request'
        id: riskover
        run: |
          {
            echo 'report<<EOF'
            cat ./.coverage/coverage-metrics.md
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Find Riskover Metrics Comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: <!-- RISKOVER_METRICS -->

      - name: Create or update comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- RISKOVER_METRICS -->
            ${{ steps.riskover.outputs.report }}
          edit-mode: replace

  all_pr_checks:
    name: Passing PR Checks
    runs-on: ubuntu-latest
    if: always()
    needs: [trunk-check, test]
    steps:
      - name: Export needs results as JSON
        id: export-needs
        run: echo '${{ toJSON(needs) }}' > needs.json

      - name: Check if all jobs passed or were skipped
        run: |
          needs=$(cat needs.json)
          for job in $(echo "$needs" | jq -r 'keys[]'); do
            result=$(echo "$needs" | jq -r ".\"$job\".result")
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Job $job failed."
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."
        shell: bash
